<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="Helvetica, Arial, sans-serif">
  <style>
    .stroke { fill: none; stroke: #000; stroke-width: 1.4; }
    .stroke-thin { fill: none; stroke: #000; stroke-width: 0.8; }
    .lead { fill: none; stroke: #000; stroke-width: 0.5; }
    .num { font-size: 13px; fill: #000; }
    .desc { font-size: 12px; fill: #000; }
    .ticker { font-size: 14px; fill: #000; font-weight: 700; text-anchor: middle; }
    .focus-text { font-size: 18px; fill: #000; font-weight: 700; text-anchor: middle; }
    .figlabel { font-size: 16px; fill: #000; font-weight: 700; text-anchor: middle; }
  </style>

  <defs>
    <pattern id="hatch-A" patternUnits="userSpaceOnUse" width="5" height="5" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="5" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#000"/>
    </marker>
  </defs>

  <!-- Schematic shows ONE focus node (left) and ONE peer node (right) enlarged, -->
  <!-- with callouts identifying each visual encoding channel and the data it represents. -->

  <!-- Focus node enlarged at (200, 500) -->
  <circle cx="200" cy="500" r="70" class="stroke" fill="url(#hatch-A)"/>
  <circle cx="200" cy="500" r="70" fill="white" fill-opacity="0.4" stroke="none"/>
  <text x="200" y="497" class="focus-text">F</text>
  <text x="200" y="518" class="ticker">N/M ↑</text>

  <!-- "Focus node 110" label -->
  <line x1="135" y1="455" x2="80" y2="395" class="lead"/>
  <text x="20" y="385" class="num">110 (focus node)</text>

  <!-- Peer node enlarged at (560, 500), positioned along radial direction -->
  <circle cx="560" cy="500" r="50" class="stroke" fill="url(#hatch-A)"/>
  <circle cx="560" cy="500" r="50" fill="white" fill-opacity="0.35" stroke="none"/>
  <text x="560" y="498" class="ticker">P</text>
  <!-- Direction glyph inside peer -->
  <polygon points="552,508 568,508 560,522" fill="#fff" stroke="#000" stroke-width="0.5"/>

  <!-- "Peer node 200" label -->
  <line x1="608" y1="455" x2="700" y2="395" class="lead"/>
  <text x="660" y="385" class="num">200 (peer indicator node)</text>

  <!-- Radial axis: arrow from focus to peer, labeled "radial distance r" -->
  <line x1="270" y1="500" x2="510" y2="500" class="stroke-thin" marker-end="url(#arrowhead)"/>
  <line x1="510" y1="500" x2="270" y2="500" class="stroke-thin" marker-end="url(#arrowhead)" opacity="0"/>
  <text x="385" y="492" class="desc" text-anchor="middle">radial distance r</text>
  <text x="385" y="525" class="desc" text-anchor="middle">(encodes correlation magnitude)</text>

  <!-- Numeral 230 for radial position -->
  <line x1="385" y1="488" x2="385" y2="440" class="lead"/>
  <text x="365" y="432" class="num">230 (radial encoding)</text>

  <!-- ============== Callouts to the peer node ============== -->

  <!-- Callout 1: Fill hue (top of peer node) -->
  <line x1="560" y1="450" x2="700" y2="200" class="lead"/>
  <text x="600" y="190" class="num">202: graded fill</text>
  <text x="600" y="205" class="desc">— hue encodes directional bias direction</text>
  <text x="600" y="220" class="desc">— opacity encodes magnitude</text>

  <!-- Callout 2: Border style (right of peer) -->
  <line x1="610" y1="500" x2="760" y2="500" class="lead"/>
  <text x="600" y="295" class="num">204 / 206: border style</text>
  <text x="600" y="310" class="desc">— solid border = positive correlation</text>
  <text x="600" y="325" class="desc">— dashed border = inverse correlation</text>
  <line x1="760" y1="500" x2="730" y2="310" class="lead" stroke-dasharray="2 3"/>

  <!-- Callout 3: Direction glyph -->
  <line x1="560" y1="515" x2="720" y2="700" class="lead"/>
  <text x="525" y="720" class="num">208: direction glyph</text>
  <text x="525" y="735" class="desc">— ▲ up-leaning, ▼ down-leaning, ▪ neutral</text>
  <text x="525" y="750" class="desc">— shape encodes direction independent of color</text>
  <text x="525" y="765" class="desc">(accessibility for color-vision deficiency)</text>

  <!-- ============== Callouts to the focus node ============== -->

  <!-- Callout 4: Focus fill -->
  <line x1="200" y1="450" x2="100" y2="200" class="lead"/>
  <text x="50" y="190" class="num">118: focus fill</text>
  <text x="50" y="205" class="desc">— same hue/opacity convention</text>
  <text x="50" y="220" class="desc">  as peer nodes, with larger cap</text>
  <text x="50" y="235" class="desc">  (focus is the visual centerpiece)</text>

  <!-- Callout 5: Basket verdict -->
  <line x1="200" y1="525" x2="80" y2="700" class="lead"/>
  <text x="40" y="720" class="num">120: basket verdict</text>
  <text x="40" y="735" class="desc">— N = count of peer nodes confirming</text>
  <text x="40" y="750" class="desc">  the focus instrument's bias</text>
  <text x="40" y="765" class="desc">— M = total number of peer nodes</text>
  <text x="40" y="780" class="desc">— arrow indicates focus direction</text>

  <!-- Title hint -->
  <text x="400" y="80" class="figlabel">Visual Encoding Channels</text>

  <!-- ===== Figure label ===== -->
  <text x="400" y="950" class="figlabel">FIG. 2</text>
</svg>
