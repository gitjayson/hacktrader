<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" font-family="Helvetica, Arial, sans-serif">
  <style>
    .stroke { fill: none; stroke: #000; stroke-width: 1.4; }
    .stroke-thin { fill: none; stroke: #000; stroke-width: 0.8; }
    .stroke-thick { fill: none; stroke: #000; stroke-width: 2; }
    .ring { fill: none; stroke: #000; stroke-width: 0.6; stroke-dasharray: 2 3; }
    .lead { fill: none; stroke: #000; stroke-width: 0.5; }
    .num { font-size: 14px; fill: #000; }
    .desc { font-size: 11px; fill: #000; }
    .ticker { font-size: 11px; fill: #000; font-weight: 700; text-anchor: middle; }
    .focus-text { font-size: 17px; fill: #000; font-weight: 700; text-anchor: middle; }
    .verdict-text { font-size: 13px; fill: #000; text-anchor: middle; }
    .figlabel { font-size: 16px; fill: #000; font-weight: 700; text-anchor: middle; }
  </style>

  <defs>
    <pattern id="hatch-up-dense2" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="hatch-up-med2" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="hatch-down-med2" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.7"/>
    </pattern>
  </defs>

  <!-- Viewport outline (heavier line to represent the full browser viewport): 800 -->
  <rect x="40" y="60" width="720" height="820" rx="6" ry="6" class="stroke-thick"/>

  <!-- Title bar / chrome — schematic only, very faint -->
  <!-- (Lite mode: NO supporting elements. Just the radar fills the viewport.) -->

  <!-- Center is now 400, 470 — radar fills the available area -->
  <!-- Concentric guides span wider in lite mode -->
  <circle cx="400" cy="470" r="160" class="ring"/>
  <circle cx="400" cy="470" r="240" class="ring"/>
  <circle cx="400" cy="470" r="320" class="ring"/>

  <!-- Connecting lines — 12 peers -->
  <line x1="400" y1="470" x2="400" y2="170" class="stroke-thin"/>
  <line x1="400" y1="470" x2="565" y2="200" class="stroke-thin"/>
  <line x1="400" y1="470" x2="688" y2="295" class="stroke-thin"/>
  <line x1="400" y1="470" x2="710" y2="470" class="stroke-thin"/>
  <line x1="400" y1="470" x2="665" y2="585" class="stroke-thin"/>
  <line x1="400" y1="470" x2="555" y2="730" class="stroke-thin"/>
  <line x1="400" y1="470" x2="400" y2="770" class="stroke-thin"/>
  <line x1="400" y1="470" x2="245" y2="748" class="stroke-thin"/>
  <line x1="400" y1="470" x2="140" y2="635" class="stroke-thin"/>
  <line x1="400" y1="470" x2="90" y2="470" class="stroke-thin"/>
  <line x1="400" y1="470" x2="145" y2="330" class="stroke-thin"/>
  <line x1="400" y1="470" x2="255" y2="200" class="stroke-thin"/>

  <!-- Focus node: bigger in lite mode -->
  <circle cx="400" cy="470" r="70" class="stroke" fill="white"/>
  <text x="400" y="461" class="focus-text">NVDA</text>
  <text x="400" y="487" class="verdict-text">9/12 ↑</text>
  <polygon points="395,508 405,508 400,497" fill="#000"/>

  <!-- 12 peer indicator nodes (slightly larger in lite mode) -->
  <circle cx="400" cy="170" r="26" fill="url(#hatch-up-dense2)" stroke="#000" stroke-width="1.4"/>
  <text x="400" y="142" class="ticker">SMH</text>

  <circle cx="565" cy="200" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="595" y="180" class="ticker">AMD</text>

  <circle cx="688" cy="295" r="26" fill="url(#hatch-up-dense2)" stroke="#000" stroke-width="1.4"/>
  <text x="725" y="290" class="ticker">QQQ</text>

  <circle cx="710" cy="470" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="745" y="475" class="ticker">SPY</text>

  <circle cx="665" cy="585" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="700" y="595" class="ticker">XLK</text>

  <circle cx="555" cy="730" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="595" y="750" class="ticker">SOXX</text>

  <circle cx="400" cy="770" r="26" fill="url(#hatch-down-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="400" y="810" class="ticker">IWM</text>

  <!-- INVERSE correlation: dashed -->
  <circle cx="245" cy="748" r="26" fill="url(#hatch-down-med2)" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="200" y="775" class="ticker">TLT</text>

  <circle cx="140" cy="635" r="26" fill="url(#hatch-down-med2)" stroke="#000" stroke-width="1.4" stroke-dasharray="4 3"/>
  <text x="90" y="650" class="ticker">UUP</text>

  <circle cx="90" cy="470" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="55" y="475" class="ticker">DIA</text>

  <circle cx="145" cy="330" r="26" fill="url(#hatch-up-med2)" stroke="#000" stroke-width="1.4"/>
  <text x="100" y="320" class="ticker">XLF</text>

  <circle cx="255" cy="200" r="26" fill="url(#hatch-up-dense2)" stroke="#000" stroke-width="1.4"/>
  <text x="215" y="180" class="ticker">VGT</text>

  <!-- Labels -->
  <line x1="60" y1="100" x2="35" y2="80" class="lead"/>
  <text x="60" y="60" class="num">800 (viewport boundary)</text>
  <text x="60" y="76" class="desc">— in "lite mode" the radial visualization</text>
  <text x="60" y="90" class="desc">  fills the entire available viewport;</text>
  <text x="60" y="104" class="desc">  all supporting display elements are hidden</text>

  <line x1="465" y1="470" x2="600" y2="430" class="lead"/>
  <text x="605" y="425" class="num">110</text>

  <line x1="688" y1="320" x2="755" y2="320" class="lead"/>
  <text x="720" y="345" class="num">200</text>

  <!-- ===== Figure label ===== -->
  <text x="400" y="935" class="figlabel">FIG. 4</text>
</svg>
