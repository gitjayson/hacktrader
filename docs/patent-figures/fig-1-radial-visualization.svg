<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1100" font-family="Helvetica, Arial, sans-serif">
  <style>
    .stroke { fill: none; stroke: #000; stroke-width: 1.4; }
    .stroke-thin { fill: none; stroke: #000; stroke-width: 0.8; }
    .ring { fill: none; stroke: #000; stroke-width: 0.6; stroke-dasharray: 2 3; }
    .lead { fill: none; stroke: #000; stroke-width: 0.5; }
    .num { font-size: 13px; fill: #000; }
    .ticker { font-size: 10px; fill: #000; font-weight: 700; }
    .focus-text { font-size: 16px; fill: #000; font-weight: 700; text-anchor: middle; }
    .verdict-text { font-size: 13px; fill: #000; text-anchor: middle; }
    .figlabel { font-size: 16px; fill: #000; font-weight: 700; text-anchor: middle; }
  </style>

  <defs>
    <pattern id="hatch-up-dense" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="hatch-up-med" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.7"/>
    </pattern>
    <pattern id="hatch-up-light" patternUnits="userSpaceOnUse" width="9" height="9" patternTransform="rotate(45)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#000" stroke-width="0.6"/>
    </pattern>
    <pattern id="hatch-down-dense" patternUnits="userSpaceOnUse" width="4" height="4" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="4" stroke="#000" stroke-width="0.8"/>
    </pattern>
    <pattern id="hatch-down-med" patternUnits="userSpaceOnUse" width="6" height="6" patternTransform="rotate(135)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#000" stroke-width="0.7"/>
    </pattern>
  </defs>

  <!-- ===== Inner display region (the rendered radar) ===== -->
  <!-- Center at (450, 540), display extends roughly 200..700 in x, 280..800 in y -->
  <rect x="220" y="260" width="460" height="560" rx="18" ry="18" class="stroke"/>

  <!-- Concentric ring guides at correlation thresholds -->
  <circle cx="450" cy="540" r="80" class="ring"/>
  <circle cx="450" cy="540" r="150" class="ring"/>
  <circle cx="450" cy="540" r="220" class="ring"/>

  <!-- 12 connecting lines, one per peer -->
  <line x1="450" y1="540" x2="450" y2="335" class="stroke-thin"/>      <!-- 12 o'clock -->
  <line x1="450" y1="540" x2="565" y2="370" class="stroke-thin"/>      <!--  1 o'clock -->
  <line x1="450" y1="540" x2="640" y2="465" class="stroke-thin"/>      <!--  2 o'clock -->
  <line x1="450" y1="540" x2="660" y2="540" class="stroke-thin"/>      <!--  3 o'clock -->
  <line x1="450" y1="540" x2="630" y2="635" class="stroke-thin"/>      <!--  4 o'clock -->
  <line x1="450" y1="540" x2="563" y2="715" class="stroke-thin"/>      <!--  5 o'clock -->
  <line x1="450" y1="540" x2="450" y2="745" class="stroke-thin"/>      <!--  6 o'clock -->
  <line x1="450" y1="540" x2="335" y2="715" class="stroke-thin"/>      <!--  7 o'clock -->
  <line x1="450" y1="540" x2="270" y2="635" class="stroke-thin"/>      <!--  8 o'clock -->
  <line x1="450" y1="540" x2="240" y2="540" class="stroke-thin"/>      <!--  9 o'clock -->
  <line x1="450" y1="540" x2="263" y2="450" class="stroke-thin"/>      <!-- 10 o'clock -->
  <line x1="450" y1="540" x2="335" y2="365" class="stroke-thin"/>      <!-- 11 o'clock -->

  <!-- Focus node at center -->
  <circle cx="450" cy="540" r="44" class="stroke" fill="white"/>
  <text x="450" y="534" class="focus-text">NVDA</text>
  <text x="450" y="555" class="verdict-text">9/12 ↑</text>

  <!-- Peer nodes (18 px radius). Ticker labels are positioned -->
  <!-- away from the focus center so they don't overlap nodes. -->

  <!-- 12 o'clock: SMH, strong up, positive -->
  <circle cx="450" cy="335" r="18" fill="url(#hatch-up-dense)" stroke="#000" stroke-width="1.4"/>
  <polygon points="444,351 456,351 450,341" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="450" y="312" class="ticker" text-anchor="middle">SMH</text>

  <!-- 1 o'clock: AMD, med up, positive -->
  <circle cx="565" cy="370" r="18" fill="url(#hatch-up-med)" stroke="#000" stroke-width="1.4"/>
  <polygon points="559,386 571,386 565,376" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="588" y="358" class="ticker">AMD</text>

  <!-- 2 o'clock: QQQ, strong up, positive -->
  <circle cx="640" cy="465" r="18" fill="url(#hatch-up-dense)" stroke="#000" stroke-width="1.4"/>
  <polygon points="634,481 646,481 640,471" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="664" y="463" class="ticker">QQQ</text>

  <!-- 3 o'clock: SPY, med up, positive -->
  <circle cx="660" cy="540" r="18" fill="url(#hatch-up-med)" stroke="#000" stroke-width="1.4"/>
  <polygon points="654,556 666,556 660,546" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="685" y="544" class="ticker">SPY</text>

  <!-- 4 o'clock: XLK, light up, positive -->
  <circle cx="630" cy="635" r="18" fill="url(#hatch-up-light)" stroke="#000" stroke-width="1.4"/>
  <polygon points="624,651 636,651 630,641" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="654" y="648" class="ticker">XLK</text>

  <!-- 5 o'clock: SOXX, med up, positive -->
  <circle cx="563" cy="715" r="18" fill="url(#hatch-up-med)" stroke="#000" stroke-width="1.4"/>
  <polygon points="557,731 569,731 563,721" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="588" y="737" class="ticker">SOXX</text>

  <!-- 6 o'clock: IWM, light down, positive -->
  <circle cx="450" cy="745" r="18" fill="url(#hatch-down-med)" stroke="#000" stroke-width="1.4"/>
  <polygon points="444,738 456,738 450,748" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="450" y="780" class="ticker" text-anchor="middle">IWM</text>

  <!-- 7 o'clock: TLT — INVERSE corr (dashed border), down -->
  <circle cx="335" cy="715" r="18" fill="url(#hatch-down-dense)" stroke="#000" stroke-width="1.4" stroke-dasharray="3 2.5"/>
  <polygon points="329,708 341,708 335,718" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="305" y="737" class="ticker">TLT</text>

  <!-- 8 o'clock: UUP — INVERSE corr (dashed), down -->
  <circle cx="270" cy="635" r="18" fill="url(#hatch-down-med)" stroke="#000" stroke-width="1.4" stroke-dasharray="3 2.5"/>
  <polygon points="264,628 276,628 270,638" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="247" y="668" class="ticker" text-anchor="middle">UUP</text>

  <!-- 9 o'clock: DIA, med up, positive -->
  <circle cx="240" cy="540" r="18" fill="url(#hatch-up-med)" stroke="#000" stroke-width="1.4"/>
  <polygon points="234,556 246,556 240,546" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="240" y="578" class="ticker" text-anchor="middle">DIA</text>

  <!-- 10 o'clock: XLF, light up, positive -->
  <circle cx="263" cy="450" r="18" fill="url(#hatch-up-light)" stroke="#000" stroke-width="1.4"/>
  <polygon points="257,466 269,466 263,456" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="263" y="427" class="ticker" text-anchor="middle">XLF</text>

  <!-- 11 o'clock: VGT, strong up, positive -->
  <circle cx="335" cy="365" r="18" fill="url(#hatch-up-dense)" stroke="#000" stroke-width="1.4"/>
  <polygon points="329,381 341,381 335,371" fill="#fff" stroke="#000" stroke-width="0.5"/>
  <text x="335" y="342" class="ticker" text-anchor="middle">VGT</text>

  <!-- ===== Reference numerals with lead lines (placed outside the display region) ===== -->

  <!-- 100: display region — top -->
  <line x1="300" y1="265" x2="220" y2="180" class="lead"/>
  <text x="150" y="170" class="num">100 (display region)</text>

  <!-- 110: focus node -->
  <line x1="492" y1="510" x2="755" y2="380" class="lead"/>
  <text x="760" y="376" class="num">110 (focus node)</text>

  <!-- 120: basket verdict text inside focus -->
  <line x1="475" y1="555" x2="760" y2="445" class="lead"/>
  <text x="760" y="441" class="num">120 (basket verdict)</text>

  <!-- 116: focus direction glyph (the up-arrow in 9/12 ↑) -->
  <line x1="466" y1="558" x2="760" y2="490" class="lead"/>
  <text x="760" y="486" class="num">116 (focus direction glyph)</text>

  <!-- 200: peer indicator node (point at SMH) -->
  <line x1="465" y1="332" x2="760" y2="260" class="lead"/>
  <text x="760" y="256" class="num">200 (peer indicator node)</text>

  <!-- 202: graded fill (point at SPY hatching) -->
  <line x1="675" y1="540" x2="760" y2="540" class="lead"/>
  <text x="760" y="544" class="num">202 (graded fill)</text>

  <!-- 204: solid border = positive correlation (SPY) -->
  <line x1="678" y1="556" x2="760" y2="600" class="lead"/>
  <text x="760" y="604" class="num">204 (solid border</text>
  <text x="760" y="620" class="num">     = positive corr.)</text>

  <!-- 208: direction glyph (point at QQQ glyph) -->
  <line x1="640" y1="478" x2="760" y2="675" class="lead"/>
  <text x="760" y="679" class="num">208 (direction glyph)</text>

  <!-- 300: connecting line (point at the SPY connecting line) -->
  <line x1="555" y1="540" x2="760" y2="740" class="lead"/>
  <text x="760" y="744" class="num">300 (connecting line)</text>

  <!-- 206: dashed border = inverse correlation (TLT) -->
  <line x1="316" y1="705" x2="135" y2="730" class="lead"/>
  <text x="20" y="725" class="num">206 (dashed border</text>
  <text x="20" y="741" class="num">     = inverse corr.)</text>

  <!-- 400: concentric ring guides — labeled 410/420/430 -->
  <line x1="290" y1="610" x2="130" y2="600" class="lead"/>
  <text x="20" y="595" class="num">400 (ring guides):</text>
  <text x="20" y="611" class="num">  410 — r ∝ 0.9</text>
  <text x="20" y="627" class="num">  420 — r ∝ 0.7</text>
  <text x="20" y="643" class="num">  430 — r ∝ 0.5</text>

  <!-- ===== Figure label ===== -->
  <text x="500" y="1040" class="figlabel">FIG. 1</text>
</svg>
